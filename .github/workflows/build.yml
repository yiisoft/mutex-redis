on:
  pull_request:
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - 'CHANGELOG.md'
      - '.gitignore'
      - '.gitattributes'
      - 'infection.json.dist'
      - 'psalm.xml'

  push:
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - 'CHANGELOG.md'
      - '.gitignore'
      - '.gitattributes'
      - 'infection.json.dist'
      - 'psalm.xml'

name: build

permissions:
  contents: read

jobs:
  tests:
    name: Redis ${{ matrix.redis }}
    uses: yiisoft/actions/.github/workflows/phpunit.yml@master

    strategy:
      matrix:
        redis:
          - 4
          - 5
          - 6

    with:
      os: '["ubuntu-latest"]'
      php: '["7.4", "8.0", "8.1"]'
      phpunitConfig: phpunit.redis-${{ matrix.redis }}.xml.dist
